<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BEN • UNI‑RESPO Engine</title>

<style>
body {
  background:#000;
  color:#eee;
  font-family:Consolas, monospace;
  padding:20px;
}
h1,h2 {
  color:#00e0ff;
  text-shadow:0 0 10px #00e0ff;
}
.block {
  border:1px solid #00e0ff;
  padding:15px;
  margin:20px 0;
  border-radius:8px;
  background:#111;
}
.matrix {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.axis8 {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.cell {
  padding:10px;
  background:#222;
  border:1px solid #333;
  text-align:center;
  border-radius:6px;
}
.scanbox {
  background:#222;
  border:1px solid #444;
  padding:10px;
  margin-top:10px;
}
.verify {
  background:#1a1a1a;
  border:1px solid #5500ff;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>BEN‑RESPO • UNI‑RESPO • WELT‑RESPO</h1>

<!-- FUNKTION.matrix -->
<div class="block">
  <h2>FUNKTION.matrix</h2>
  <p>Achsen: TMP / TRANS / WARB<br>
     Felder: WLOCH / KANAL / GATE</p>

  <div class="matrix">
    <div class="cell">TMP.WLOCH</div>
    <div class="cell">TMP.KANAL</div>
    <div class="cell">TMP.GATE</div>

    <div class="cell">TRANS.WLOCH</div>
    <div class="cell">TRANS.KANAL</div>
    <div class="cell">TRANS.GATE</div>

    <div class="cell">WARB.WLOCH</div>
    <div class="cell">WARB.KANAL</div>
    <div class="cell">WARB.GATE</div>
  </div>
</div>

<!-- BEN‑Axiom‑System -->
<div class="block">
  <h2>BEN‑Axiom‑System</h2>
  <div class="matrix">
    <div class="cell">BEN</div>
    <div class="cell">BEN.tmp</div>
    <div class="cell">BEN.trans</div>

    <div class="cell">BEN.warb</div>
    <div class="cell">BEN‑NC3×3</div>
