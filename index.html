<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SYM · WHIRL · SQRT · NC.math</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; }
pre { background:#111; padding:20px; border-left:3px solid #6cf; }
</style>

<!-- Kernsystem -->
<script src="sym.sym"></script>
<script src="sqrt.room"></script>
<script src="NC.math"></script>
<script src="API.room"></script>
<script src="X.room.CORE"></script>
<script src="SYSTEM.me"></script>
<script src="ROOT.me"></script>

<!-- Ghost als Symbol-Layer -->
<script>
window.GHOST = {
    active: true,
    symbol: "SYM/BOL",
    info() {
        return "Ghost-Layer aktiv · Symbol bereit";
    }
};
</script>

</head>
<body>

<h1>SYM · System-Scan & WHIRL-Neustart</h1>
<pre id="sys"></pre>

<script>
(async function () {

    // Nur Dateien, die wirklich existieren und relevant sind
    const files = [
        "API.room",
        "new.room",
        "sqrt.room",
        "sym.sym",
        "9×9‑Operator.me",
        "BEN‑NC3×3.room",
        "BEN‑NC6eT6D.room",
        "BEN‑NC9×9.room",
        "NC.math",
        "ROOT.me",
        "SOURCE.me",
        "SYSTEM.me",
        "X.room.CORE",
        "X.room.IN",
        "X.room.OUT",
        "ghost.html"
    ];

    // SYM Level‑1 Scan
    const scan = SYM.scan(files);

    // Reparatur
    const repaired = SYM.repair(scan);

    // Log
    const log = SYM.log(repaired);

    // Ausgabe
    document.getElementById("sys").innerText = 
        log + "\n\nGhost-Layer: " + GHOST.info();

})();
</script>

</body>
</html>
