<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SYM · WHIRL · SQRT · NC.math · iki1uc-SYSTEM</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; }
pre { background:#111; padding:20px; border-left:3px solid #6cf; }
</style>

<!-- Kernsystem -->
<script src="sym.sym"></script>
<script src="sqrt.room"></script>
<script src="NC.math"></script>
<script src="API.room"></script>
<script src="X.room.IN"></script>
<script src="X.room.CORE"></script>
<script src="X.room.OUT"></script>
<script src="SYSTEM.me"></script>
<script src="ROOT.me"></script>
<script src="SOURCE.me"></script>

<!-- Ghost-Layer -->
<script>
window.GHOST = {
    active: true,
    symbol: "SYM/BOL",
    info() {
        return "Ghost-Layer aktiv · Symbol bereit";
    },
    ping() {
        return "GHOST-PING · OK";
    }
};
</script>

</head>
<body>

<h1>SYM · System-Scan · WHIRL-Neustart · iki1uc-SYSTEM</h1>
<pre id="sys"></pre>

<script>
(async function () {

    // Vollständige Datei-Liste
    const files = [
        "API.room",
        "new.room",
        "sqrt.room",
        "sym.sym",
        "9.html",
        "BEN-NC3×3.room",
        "BEN-NC6eT6D.room",
        "BEN-NC9×9.room",
        "NC.math",
        "ROOT.me",
        "SOURCE.me",
        "SYSTEM.me",
        "X.room.IN",
        "X.room.CORE",
        "X.room.OUT",
        "ghost.html"
    ];

    // SYM Level‑1 Scan
    const scan = SYM.scan(files);

    // WHIRL – Neustart
    const whirl = SYM.whirl(scan);

    // SQRT – mathematische Prüfung
    const sqrtCheck = SQRT.check(whirl);

    // NC – Matrix-Validierung
    const ncCheck = NC.validate();

    // SYSTEM – Kernprüfung
    const sysCheck = SYSTEM.verify();

    // ROOT – Verankerung
    const rootCheck = ROOT.anchor();

    // LOG – Zusammenfassung
    const log = SYM.log({
        scan,
        whirl,
        sqrtCheck,
        ncCheck,
        sysCheck,
        rootCheck,
        ghost: GHOST.info(),
        ghostPing: GHOST.ping()
    });

    // Ausgabe
    document.getElementById("sys").innerText = log;

})();
</script>

</body>
</html>
